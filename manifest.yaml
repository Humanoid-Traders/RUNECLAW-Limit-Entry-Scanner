    options: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "JTOUSDT", "BNBUSDT", "SUIUSDT", "FILUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "SKYAIUSDT", "BCHUSDT", "AVAXUSDT", "PENGUUSDT", "SIRENUSDT", "DOTUSDT", "ICPUSDT", "NEARUSDT", "LTCUSDT", "VIRTUALUSDT", "PUMPUSDT", "DYDXUSDT", "WLFIUSDT", "FARTCOINUSDT", "AAVEUSDT", "UNIUSDT", "OPUSDT", "ASTERUSDT", "DASHUSDT", "WLDUSDT", "WIFUSDT", "ORDIUSDT", "ARBUSDT", "TRXUSDT", "XPLUSDT", "RAVEUSDT", "XLMUSDT", "ETCUSDT", "TRUMPUSDT", "APTUSDT", "HBARUSDT", "1000BONKUSDT", "VVVUSDT", "BIOUSDT", "MUSDT", "CHIPUSDT", "PENDLEUSDT", "XMRUSDT", "ALGOUSDT", "CRVUSDT", "TIAUSDT", "RENDERUSDT", "INJUSDT", "JUPUSDT", "FETUSDT", "APEUSDT", "SEIUSDT", "ATOMUSDT", "LDOUSDT"]
    min_items: 1
    max_items: 66
    label: "Scan universe (USDT perpetuals; first constructive name is the regime gate)"
  leverage:
    type: integer
    default: 10
    min: 1
    max: 25
    aliases:
      10x: 10
      20x: 20
    label: "Leverage"
  margin_budget:
    type: string
    default: "100"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Margin budget USDT (sizing + return %% denominator)"
  max_loss_usdt:
    type: string
    default: "15"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Max loss per trade USDT (drives position size from the stop)"
  max_scan_symbols:
    type: integer
    default: 66
    min: 5
    max: 66
    label: "Symbols scanned per pass"
  min_score:
    type: integer
    default: 70
    min: 1
    max: 100
    label: "Minimum score to place a long or short"
  allow_short:
    type: boolean
    default: true
    label: "Enable short-side setups"
  max_concurrent:
    type: integer
    default: 3
    min: 1
    max: 10
    label: "Max concurrent open positions"
  atr_limit_mult:
    type: number
    default: 0.5
    min: 0.1
    max: 1.5
    label: "Limit-entry depth (x ATR from VWAP; lower fills sooner)"
  max_vwap_ext_pct:
    type: string
    default: "4.0"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Max distance from VWAP to enter (%; skips overextended momentum movers the limit can't fill)"
