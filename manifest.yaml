name: runeclaw-limit-scanner
display_name: "RUNECLAW Limit Entry Scanner"
version: "0.9.17"
description: "Live multi-asset perpetual-futures scanner across crypto, equities (RWA US stock perps), and commodities (precious metals) — each class gated by its own market-regime leader (BTC / Nasdaq-QQQ / gold) — placing pullback limit longs or shorts with portfolio-level risk controls"
long_description: |
  RUNECLAW is a two-sided, multi-asset scanner for USDT-margined perpetual
  futures that aims to trade with the prevailing regime rather than against it.
  It scans three asset classes in parallel — crypto, equities (RWA US stock
  perps), and commodities (precious metals) — each gated by its own
  market-regime leader: BTC for crypto, the Nasdaq proxy QQQ for equities, and
  gold for commodities.

  The thesis is that the cleanest intraday entries come from assets already
  moving in their leader's direction, positioned in the favorable part of their
  recent range, supported by real resting demand on the side it wants to trade.
  Before any candidate is considered, the strategy reads that class's regime;
  when the backdrop is weak or mixed it stands aside for that class and opens
  nothing, treating capital preservation as the first job. Each class's qualified
  candidates are merged into one pool, so a single cycle can short equities while
  it longs crypto — subject to portfolio concurrency and correlation caps.

  When a leader is constructive the scanner looks for longs; when it is clearly
  weak it looks for shorts. It ranks the universe with a blended score built from
  relative strength versus the leader, location against the day's VWAP, position
  within the session range, resting order-book balance, and traded liquidity —
  every dimension mirrored for the side being sought. Only names that clear a
  quality bar become candidates. It enters with a resting limit on the favorable
  side of VWAP, waiting for a normal retracement instead of chasing.

  Exits are layered and risk-first: a protective stop beyond the recently
  defended level, staged profit-taking, a trailed remainder so strong moves keep
  working, and a stop lifted toward breakeven once a trade moves enough in favor.
  A portfolio layer caps concurrent positions, limits correlated exposure,
  expires stale resting orders, applies an intraday time-stop, and halts new
  entries after a fresh losing streak (a stateless realized-loss breaker sourced
  from exchange fills, so it works without persisted state).

  Under the hood it is six cooperating engines run once per cycle — feature
  (one 24h ticker per symbol), regime (gates direction off the leader), scoring
  (the 0-100 directional blend), risk (size solved backward from a fixed
  per-trade dollar loss, capped by the margin budget), execution (places the
  pullback limit and owns the live book: size-scoped ownership, stale-limit
  expiry, chase-cancel, time-stop, circuit breaker), and an orchestrator that
  emits one compact diagnostic line per cycle. The README documents each in full.

  Subscribers can tune the universe, leverage, the margin budget that anchors
  sizing and the displayed return, the per-trade dollar risk cap, names scanned
  per pass, the score required to act, whether shorting is enabled, and how many
  positions run concurrently.

  The strategy underperforms when leaders chop without direction or fast moves
  slice through stops; by design it can sit idle for long stretches. Past
  performance is not a guarantee, and live trading pays fees and slippage that
  erode edge, so size every position to a drawdown you can tolerate.
market_type: contract
trading_symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "BNBUSDT", "SUIUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "BCHUSDT", "AVAXUSDT", "NEARUSDT", "AAVEUSDT", "WLDUSDT", "XPLUSDT", "XLMUSDT", "TRUMPUSDT", "MUSDT", "INJUSDT", "SEIUSDT", "PEPEUSDT", "SHIBUSDT"]
tags: ["scanner", "momentum", "vwap", "orderbook", "contract", "live", "runeclaw"]

schedule:
  cron: "*/15 * * * *"
  tz: "Asia/Shanghai"

decision_mode: deterministic
backtest_support: none
runtime_profile: deterministic
execution_mode: signal_only
follow_trade_supported: true

strategy_config:
  trading_symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "BNBUSDT", "SUIUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "BCHUSDT", "AVAXUSDT", "NEARUSDT", "AAVEUSDT", "WLDUSDT", "XPLUSDT", "XLMUSDT", "TRUMPUSDT", "MUSDT", "INJUSDT", "SEIUSDT", "PEPEUSDT", "SHIBUSDT"]
  leverage: 10
  margin_budget: "100"
  max_loss_usdt: "15"
  # v0.6.4 -- margin mode for new opens. "crossed" (default) keeps the proven
  # open_* wrapper path (the SDK wrappers cannot set margin_mode, so they always
  # inherit place_order's 'crossed' default -- which is why every prior position
  # was cross-margined despite older docs claiming isolated). "isolated" routes
  # opens through place_order(margin_mode='isolated'); it is fail-closed (a wrong
  # hedge mapping rejects rather than placing a wrong-direction trade) but UNTESTED
  # on this account, so trial it in signal_only / tiny size first. See
  # docs/DESIGN_v0.6.4.md. Per-trade loss is bounded by the exchange SL + max_loss
  # regardless of this setting; isolated additionally caps gap-through-stop loss to
  # the position's own margin instead of whole-account equity.
  margin_mode: "crossed"
  max_scan_symbols: 28
  min_score: 70
  conditional_score: 50
  min_volume_usdt: "10000000"
  atr_limit_mult: "0.3"
  max_vwap_ext_pct: "4.0"
  tp1_pct: "5.0"
  # v0.6.3 — trailing-stop exit (validated in research/replay_mp.py at 3-slot
  # concurrency). The manager ratchets the SL to price -/+ trail_atr_mult*ATR
  # (protective direction only, fail-safe no-op); tp2 is a WIDE backstop so the
  # trail isn't capped (a tight backstop erased the edge in validation). Longer
  # time_stop_hours gives the trail room. See docs/DESIGN_v0.6.3.md.
  # v0.9.15 — widened 15 -> 20 (strategy-sweep winner, re-reproduced serially here;
  # the harness is deterministic serially -- repeat runs are byte-identical). This
  # un-caps the WIDE backstop the trail is supposed to ride behind: at 15 a few
  # breakout runners were force-taken at +15% instead of trailed further. Controlled
  # A/B (only tp2 changed, full live stack) -- tp2=20 weakly DOMINATES tp2=15 in all
  # three windows, tail dead-flat everywhere, never worse on any metric:
  #   A 35d-breakout (primary): 73t +17.8% PF1.26 -> 74t +18.6% PF1.27  (+0.8pt net,
  #     +1 trade, +0.01 PF; maxDD -13.8% & worst-trade -6.2% UNCHANGED)
  #   B 21d-breakout:           42t +7.2% PF1.24  -> 42t +7.4% PF1.25   (+0.2pt, tail flat)
  #   C 35d-pullback:           30t +15.1% PF1.88 -> identical (fully inert)
  # Plateau step: tp2=10==15 and tp2=25==20 (the cap only binds between). NOTE the
  # real primary gain is ~+0.8pt (a handful of breakout-tail trades), NOT the +3.3pt
  # the sweep headline showed (its baseline wandered across concurrent runs). It is
  # deterministic and zero-downside, so it ships as a low-magnitude un-cap, not a
  # fitted optimum -- treat the net delta as directional.
  tp2_pct: "20.0"
  trail_atr_mult: "2.0"
  breakeven_pct: "2.0"
  # v0.9.6 -- breakeven floor UNDER the trail. The trail rides trail_atr_mult*ATR
  # behind the high-water mark, so a name that runs LESS than that width leaves the
  # stop below entry and gives back the whole move (the live 2026-07-02 MSTR case:
  # peaked +4.37% but the 2*ATR trail still sat below entry, so a would-be flat
  # stopped at -$3.75). Once breakeven is armed, the protective stop is floored at
  # breakeven_lock_pct the other side of entry (a small fee-clearing lock), applied
  # only when that price is already inside the market (never an above-market self-
  # trigger). Default 0 = OFF (pure trail, proven no-op -- same opt-in rollout as
  # loss_breaker_frac/event_blackout). Validated in research/replay_mp.py --ab-belock:
  # maxDD falls in EVERY window (35d breakout -29.4%->-16.4%), net preserved at
  # ~0.75*breakeven_pct; a tiny "flat" lock is the worst choice (banks nothing yet
  # chokes runners). Recommended when armed: 1.5 (must stay < breakeven_pct).
  # ARMED 2026-07-02: enabling at 1.5 after the live MSTR give-back (peaked +$26,
  # stopped -$3.75). Validated tail-cutting in every replay window and
  # net-preserving; 1.5 is 0.75*breakeven_pct so it clears fees and banks a real
  # win on a reversal without choking runners (a tiny flat lock was the worst).
  breakeven_lock_pct: "1.5"
  # v0.9.7 -- step-lock LADDER: generalizes the single lock above to rising
  # floors, "arm:lock,arm:lock" in % of entry. As a runner extends past each arm
  # level the protective floor climbs to that rung's lock, so a big move banks
  # progressively more on a reversal (the single lock only ever banked 1.5%).
  # Same contract: tighten-only, inside-market guard, stateless (the exchange SL
  # is the memory). Validated in replay --ab-exitpack: beat the single lock in
  # both breakout-ON windows (the live config; +14.7%->+21.2% net, PF 1.21->1.31
  # in the 35d window). ARMED at ship (it strictly extends the already-armed
  # v0.9.6 lock -- rung one IS the 2:1.5 lock). Empty string disables.
  steplock: "2:1.5,4:3,6:4.5"
  # v0.9.7 -- "Rule 9" scale-out: once a position moves scaleout_trigger_pct in
  # favour, close scaleout_frac of it at market; the remainder rides the trail +
  # ladder. The one STRICT win of the exit-pack A/B (net AND maxDD improved in
  # every window at frac 0.5). Ships OFF (0) despite validating because it is NEW
  # order surface (partial reduce via place_order trade_side=close, hedge-mode
  # fields) -- same trial gate as margin_mode v0.6.4: arm at small size first,
  # watch the scale_out/so diag, then trust. Fail-closed everywhere; an
  # exchange reject is surfaced, never retried blind. Recommended when trialed: 0.5.
  # ARMED 2026-07-02 (0.6.17): trial at the validated 0.5 -- bank half at +3.5%,
  # the remainder rides the trail + ladder. This is the trial itself: the first
  # live trim is the mapping proof (watch the scale_out action / so: diag; a
  # reject or a fail-closed no-op is surfaced, never retried blind). Positions
  # are already small ($60 margin/slot), which IS the small-size condition.
  scaleout_frac: "0.5"
  scaleout_trigger_pct: "3.5"
  sl_min_btc_eth_pct: "1.5"
  sl_min_sol_bnb_pct: "1.2"
  sl_min_alt_pct: "2.5"
  bidask_full_ratio: "2.0"
  bidask_partial_ratio: "1.2"
  bidask_wall_ratio: "10.0"
  allow_short: true
  max_concurrent: 3
  max_correlated_alts: 2
  circuit_pause_usdt: "30"
  circuit_stop_usdt: "40"
  # v0.8.0 -- stateless realized-loss breaker (the working replacement for the
  # .state-backed equity circuit breaker above, which is dead in this runtime:
  # .state/ does not persist, so day_start_equity never round-trips). Pauses NEW
  # entries when trailing-window realized PnL (summed from exchange fills, no local
  # state) is at/below loss_breaker_frac * margin_budget * leverage. Validated in
  # research/replay_mp (DESIGN_v0.8.0): 0.08 over 24h was harmless in healthy
  # windows (never fired) and cut maxDD ~22% in weak ones. Default 0 = OFF (opt-in,
  # proven no-op); set frac to 0.08 to enable. Pause only -- never flattens.
  # ARMED 2026-07-01: the operator's first live drawdown session (2W/4L,
  # -$33.21, two correlated overnight crypto shorts both stopped) was the
  # exact pattern this breaker targets. Enabling now -- validated harmless in
  # healthy sessions, tail-cutting in weak ones.
  loss_breaker_frac: "0.08"
  loss_breaker_window_hours: "24"
  # v0.9.1 -- Phase-4 live trade journal. Each cycle, emit recent closed-trade
  # realized records (from exchange fills -- the same read the loss breaker uses, so
  # no extra cost when the breaker is on) into the DBG metrics, so live results can
  # be reconciled against the backtest (the missing live-vs-backtest feedback loop).
  # Read-only, fail-open. Realized PnL only -- live MAE/MFE needs an intra-trade
  # high-water track the stateless runtime can't keep. Default on; set false to skip.
  journal_enabled: "true"
  journal_window_hours: "24"
  # v0.9.5 -- macro event blackout (audit: "no news/event filter on RWA equity
  # perps"). Universes with `event_blackout: true` suppress NEW entries within
  # +/- event_blackout_hours of a high-importance US calendar event (FOMC, CPI,
  # NFP -- data.economy.calendar). Opt-in: 0 = OFF (proven no-op default, same
  # rollout pattern as margin_mode/loss_breaker). Recommended: 2. FAIL-OPEN --
  # an unreadable calendar never blocks trading; existing positions/limits are
  # never touched (this gates opens only).
  # ARMED 2026-07-02 (0.6.15): set to 2 now that the equity legs (TSLA/NVDA/MSTR)
  # are fully effective in 0.6.14. Stock perps gap on high-importance US prints
  # (FOMC/CPI/NFP) and the SL/trail are tuned on crypto's continuous tape, so
  # opted-in universes stand aside +/-2h around those events. Crypto/metals do
  # not opt in, so their entries are unaffected.
  event_blackout_hours: "2"
  event_blackout_importance: "high"
  event_blackout_country: "US"
  time_stop_hours: "12"
  limit_expiry_hours: "4"
  limit_chase_pct: "3.0"
  size_scope_mult: "1.5"
  breakeven_trigger_usdt: "20"
  # v0.2.0 — kline engine (multi-timeframe ATR + higher-TF trend)
  kline_interval: "1h"
  atr_period: 14
  trend_interval: "4h"
  trend_lookback: 12
  trend_norm: "0.05"
  trend_weight: "15.0"
  enrich_top_n: 8
  # v0.2.0 — funding engine (crowding skip + soft penalty)
  funding_interval: "1h"
  funding_window: 8
  funding_skip_bps: "30"
  funding_penalty_weight: "8.0"
  # v0.9.12 -- universes the funding skip/penalty applies to. Funding is sourced
  # from data.crypto.futures.funding_rate, a CRYPTO endpoint with no RWA-equity or
  # metals coverage, so on those perps it returns a mis-resolved/foreign value that
  # spuriously trips the 30bps skip (the live MSTR funding_cr flicker). Restricting
  # the funding logic to crypto -- where the reading is native -- removes the whole
  # spurious-skip class while keeping full crowding protection on crypto. Fail-open
  # on an unknown/empty universe (an unlabeled crypto candidate keeps protection).
  funding_universes: ["crypto"]
  # v0.9.13 -- universes the taker-flow regime gate applies to. taker_buy_ratio
  # sources data.crypto.futures.taker_volume, a CRYPTO endpoint (same class as
  # funding); on equity/metals leaders (QQQ/XAU) it returns a mis-resolved value
  # that can flip the universe's regime side AND size. Restrict it to crypto, where
  # the reading is native; non-crypto leaders pass taker=None and the gate degrades
  # to the up/vwap 2-signal form. Fail-open on an unknown/empty universe.
  taker_universes: ["crypto"]
  # v0.5.0 — momentum/breakout entry path (OFF by default; flip per instance).
  # When on, a crypto name extended past max_vwap_ext_pct that is riding a strong
  # aligned higher-TF trend at the session extreme is entered at MARKET (not a
  # pullback limit it could never fill), with a tight structure stop. See
  # docs/DESIGN_v0.5.0.md. v0.5.1: enabled by default + exposed as a subscriber
  # toggle so the crypto breakout path runs live (was off-by-default in v0.5.0).
  breakout_enabled: true
  breakout_trend_min: "0.6"        # min kline trend_strength [0,1] to confirm
  breakout_extreme_band: "0.015"   # must be within 1.5% of the 24h extreme
  breakout_stop_atr_mult: "1.0"    # structure-stop volatility floor in ATRs
  breakout_level_buffer_pct: "0.2" # stop sits this % beyond the broken level
  breakout_tp1_pct: "4.0"          # breakout first target (independent of pullback tp1)
  # v0.3.0 — multi-universe scanning; each universe gates on its own leader.
  # A universe with no 'symbols' inherits the trading_symbols list above.
  # v0.6.0 — breakout is now per-universe (was hard-wired to crypto). A universe
  # opts in with breakout: true; `overrides` tunes pass-1 keys for that class.
  universes:
    - name: "crypto"
      leader: "BTCUSDT"
      breakout: true
    # v0.3.1: pruned to silver-only. Gold leads/gates; Pt/Pd/Cu were always
    # below min_volume_usdt ($10M) on Bitget -> permanently thin-skipped, so they
    # were dead weight (wasted scan calls). Silver (~$257M/24h) is the one liquid
    # metal candidate. Effective metals leg = "trade silver, gated by gold."
    - name: "metals"
      leader: "XAUUSDT"
      symbols: ["XAGUSDT"]
    # v0.4.0: equities (RWA US stock perps), gated by the Nasdaq proxy QQQ.
    # Only liquid names kept (>= min_volume_usdt $10M): QQQ leads/gates; TSLA,
    # NVDA, MSTR are candidates. SPX/AAPL/MSFT/AMZN/GOOGL/META/COIN were below
    # the volume floor -> excluded. NOTE: stock perps track underlying equities
    # that gap on session boundaries; off-hours liquidity is thinner than crypto.
    # v0.6.0: equities opt into breakout. They trend (MSTR chase-cancelled twice
    # into a clean down-move the pullback-short could not catch) but move less than
    # crypto, so the breakout routing trigger is lowered to 2.5% extension (vs the
    # crypto 4%) via a per-universe override. Market-entry slippage on these thinner
    # books is watched; set breakout: false here to revert if it is bad.
    # v0.9.5: equities opt into the macro event blackout (see
    # event_blackout_hours below) -- stock perps gap on high-importance US
    # prints and the SL/trail are tuned on crypto's continuous tape.
    # NOTE (v0.9.5 bug fix): per-universe flags (breakout / overrides /
    # event_blackout) were silently DROPPED by _universes() since v0.6.0 --
    # equities actually ran pullback-only at the global 4% ext cap the whole
    # time. The passthrough is fixed; these flags are now effective.
    - name: "equities"
      leader: "QQQUSDT"
      symbols: ["TSLAUSDT", "NVDAUSDT", "MSTRUSDT"]
      breakout: true
      event_blackout: true
      overrides:
        max_vwap_ext_pct: "2.5"

user_config_schema:
  trading_symbols:
    type: array
    item_type: string
    default: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "BNBUSDT", "SUIUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "BCHUSDT", "AVAXUSDT", "NEARUSDT", "AAVEUSDT", "WLDUSDT", "XPLUSDT", "XLMUSDT", "TRUMPUSDT", "MUSDT", "INJUSDT", "SEIUSDT", "PEPEUSDT", "SHIBUSDT"]
    options: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "BNBUSDT", "SUIUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "BCHUSDT", "AVAXUSDT", "NEARUSDT", "AAVEUSDT", "WLDUSDT", "XPLUSDT", "XLMUSDT", "TRUMPUSDT", "MUSDT", "INJUSDT", "SEIUSDT", "PEPEUSDT", "SHIBUSDT"]
    min_items: 1
    max_items: 28
    label: "Scan universe (USDT perpetuals; first constructive name is the regime gate)"
  leverage:
    type: integer
    default: 10
    min: 1
    max: 25
    aliases:
      10x: 10
      20x: 20
    label: "Leverage"
  margin_budget:
    type: string
    default: "100"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Margin budget USDT (sizing + return %% denominator)"
  max_loss_usdt:
    type: string
    default: "15"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Max loss per trade USDT (drives position size from the stop)"
  max_scan_symbols:
    type: integer
    # v0.9.4 (audit M-3): default was 66 with max 28 -- the default violated its
    # own bound. Align with strategy_config.max_scan_symbols (28).
    default: 28
    min: 5
    max: 28
    label: "Symbols scanned per pass"
  min_score:
    type: integer
    default: 70
    min: 1
    max: 100
    label: "Minimum score to place a long or short"
  allow_short:
    type: boolean
    default: true
    label: "Enable short-side setups"
  max_concurrent:
    type: integer
    default: 3
    min: 1
    max: 10
    label: "Max concurrent open positions"
  atr_limit_mult:
    type: number
    default: 0.3
    min: 0.1
    max: 1.5
    label: "Limit-entry depth (x ATR from VWAP; lower fills sooner)"
  max_vwap_ext_pct:
    type: string
    default: "4.0"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Max distance from VWAP to enter (%; beyond this a strong-trend crypto name is a breakout, not a pullback)"
  breakout_enabled:
    type: boolean
    default: true
    label: "Breakout entries (crypto): market-enter strong trends extended past the VWAP cap, with a tight structure stop"
  margin_mode:
    type: string
    default: "crossed"
    pattern: "^(crossed|isolated)$"
    label: "Margin mode for new opens (crossed = proven default; isolated = trial-gated, see DESIGN_v0.6.4)"
  loss_breaker_frac:
    type: number
    default: 0.08
    min: 0
    max: 0.5
    label: "Realized-loss breaker: pause new entries after trailing-window realized loss reaches this x one slot's notional (0 = off; 0.08 = armed default, see DESIGN_v0.8.0)"
  loss_breaker_window_hours:
    type: number
    default: 24
    min: 1
    max: 168
    label: "Realized-loss breaker lookback window (hours)"
  journal_enabled:
    type: boolean
    default: true
    label: "Live trade journal: emit closed-trade realized records each cycle for live-vs-backtest reconciliation (read-only)"
  journal_window_hours:
    type: number
    default: 24
    min: 1
    max: 168
    label: "Live journal lookback window (hours)"
  event_blackout_hours:
    type: number
    default: 2
    min: 0
    max: 24
    label: "Macro event blackout: suppress NEW entries in opted-in universes within this many hours of a high-importance US calendar event (0 = off; 2 recommended for RWA equities)"
  breakeven_lock_pct:
    type: number
    default: 1.5
    min: 0
    max: 5
    label: "Breakeven floor under the trail: once a trade is in profit, lock the stop this %% the other side of entry so a runner that reverses can't give back the whole move (0 = off; 1.5 recommended when armed, must stay below breakeven_pct; see DESIGN v0.9.6)"
  steplock:
    type: string
    default: "2:1.5,4:3,6:4.5"
    pattern: "^([0-9]+(\\.[0-9]+)?:[0-9]+(\\.[0-9]+)?)(,[0-9]+(\\.[0-9]+)?:[0-9]+(\\.[0-9]+)?)*$|^$"
    label: "Step-lock ladder 'arm:lock,arm:lock' in %% of entry -- the protective floor climbs to the highest armed rung as the move extends (empty = off; '2:1.5,4:3,6:4.5' validated)"
  scaleout_frac:
    type: number
    default: 0.5
    min: 0
    max: 0.9
    label: "Scale-out: fraction of the position closed at market once the move passes scaleout_trigger_pct; remainder rides the trail + ladder (0 = off; 0.5 validated -- trial at small size first, new order surface)"
  scaleout_trigger_pct:
    type: number
    default: 3.5
    min: 0.5
    max: 20
    label: "Scale-out arm level (%% move in favour from entry)"
