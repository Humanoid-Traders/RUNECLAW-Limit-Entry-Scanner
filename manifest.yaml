name: runeclaw-limit-scanner
display_name: "RUNECLAW Limit Entry Scanner"
version: "0.1.0"
description: "Live two-sided perpetual-futures scanner that ranks a configurable universe behind a market-regime gate and places pullback limit longs or shorts with portfolio-level risk controls"
long_description: |
  RUNECLAW is a two-sided scanner for USDT-margined perpetual futures that aims
  to trade with the prevailing regime rather than against it. The thesis is that
  the cleanest intraday entries come from assets already moving in the leader's
  direction, positioned in the favorable part of their recent range, supported by
  real resting demand on the side it wants to trade. Before any candidate is
  considered, the strategy reads the market leader's regime; when that backdrop is
  weak or mixed it stands aside entirely and opens nothing, treating capital
  preservation as the first job.

  When the leader is constructive the scanner looks for longs; when the leader is
  clearly weak it looks for shorts. Either way it ranks the configured universe
  with a blended score built from relative strength versus the leader, location
  against the day's volume-weighted average price, position within the session
  range, resting order-book balance, and traded liquidity, with every dimension
  mirrored for the side being sought. Only names that clear a quality bar become
  candidates. It enters with a resting limit order placed on the favorable side of
  the day's average price, waiting for a normal retracement instead of chasing.

  Exits are layered and risk-first. A protective stop sits beyond the level the
  market has recently defended, profit is taken in stages, a remaining portion is
  trailed so a strong move can keep working, and the stop is lifted toward
  breakeven once a trade moves enough in favor. A portfolio layer caps how many
  positions run at once, limits correlated exposure, expires stale resting orders,
  applies an intraday time-stop, and halts new entries when the day's running loss
  breaches a circuit breaker.

  Subscribers can tune the universe, leverage, the margin budget that anchors
  sizing and the displayed return, the per-trade dollar risk cap, the number of
  names scanned per pass, the score required to act, whether shorting is enabled,
  and how many positions may run concurrently. Higher leverage or risk cap
  enlarges gains and drawdowns alike; widening the universe spreads attention but
  increases data load.

  The strategy underperforms when the leader chops without direction, when breadth
  is weak, or when fast moves slice through stops; by design it can sit idle for
  long stretches. Past performance is not a guarantee, and live trading pays fees
  and slippage that erode edge, so size every position to a drawdown you can
  tolerate.
