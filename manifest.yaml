name: runeclaw-limit-scanner
display_name: "RUNECLAW Limit Entry Scanner"
version: "0.1.0"
description: "Live perpetual-futures scanner that ranks a configurable altcoin universe behind a market-regime gate and places pullback limit longs with risk-based sizing"
long_description: |
  RUNECLAW is a long-only scanner for USDT-margined perpetual futures that aims
  to buy strength on a pullback rather than chasing price. The thesis is that the
  cleanest intraday longs come from assets already showing relative strength
  against the broader market, trading in the upper part of their recent range,
  supported by real resting demand, while the market leader itself is in a
  constructive regime. Before any candidate is considered, the strategy checks
  the lead asset's regime; when that backdrop is weak it stands aside entirely
  and opens nothing, treating capital preservation as the first job.

  When the regime is constructive, the scanner ranks the configured universe with
  a blended score built from relative momentum, location versus the day's
  volume-weighted average price, position within the session range, resting
  order-book balance between bids and offers, and traded liquidity. Only names
  that clear a quality bar become candidates. The strategy enters long with a
  resting limit order placed below the day's average price, so it waits for a
  normal retracement to come to it instead of paying up: shallow enough to still
  fill on ordinary dips, deep enough to avoid buying the high.

  Exits are layered. A protective stop sits beneath the level the market has
  already defended, and profit is taken in stages: a first target locks in gains
  quickly, a further target extends the move, and a remaining portion is trailed
  with a volatility-based stop so a strong run can keep working. Once a trade
  moves enough in favor, the stop is lifted toward breakeven to remove downside.

  Subscribers can tune the tradable universe, the leverage applied, the margin
  budget that anchors sizing and the return percentage shown, the per-trade
  dollar risk cap that drives position size backward from the stop, the number of
  names scanned per pass, and the minimum score required to act. Raising leverage
  or the risk cap enlarges both gains and drawdowns; widening the universe spreads
  attention but increases data load.

  The strategy underperforms when the leader is choppy or falling, when breadth is
  weak, or when thin names gap through stops; it can sit idle for long stretches
  by design. Past performance is not a guarantee, and live trading pays fees and
  slippage that erode edge, so size it to a drawdown you can tolerate.
