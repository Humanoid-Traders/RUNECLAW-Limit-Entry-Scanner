name: runeclaw-limit-scanner
display_name: "RUNECLAW Limit Entry Scanner"
version: "0.4.0"
description: "Live multi-asset perpetual-futures scanner across crypto, equities (RWA US stock perps), and commodities (precious metals) — each class gated by its own market-regime leader (BTC / Nasdaq-QQQ / gold) — placing pullback limit longs or shorts with portfolio-level risk controls"
long_description: |
  RUNECLAW is a two-sided, multi-asset scanner for USDT-margined perpetual
  futures that aims to trade with the prevailing regime rather than against it.
  It scans three asset classes in parallel — crypto, equities (RWA US stock
  perps), and commodities (precious metals) — and each class is gated by its own
  market-regime leader: BTC for crypto, the Nasdaq proxy QQQ for equities, and
  gold for commodities.
  The thesis is that the cleanest intraday entries come from assets already moving
  in their leader's direction, positioned in the favorable part of their recent
  range, supported by real resting demand on the side it wants to trade. Before
  any candidate is considered, the strategy reads that class's regime; when the
  backdrop is weak or mixed it stands aside for that class and opens nothing,
  treating capital preservation as the first job. Each class's qualified
  candidates are merged into one pool, so a single cycle can, for example, short
  equities while it longs crypto — subject to the portfolio concurrency and
  correlation caps.

  When the leader is constructive the scanner looks for longs; when the leader is
  clearly weak it looks for shorts. Either way it ranks the configured universe
  with a blended score built from relative strength versus the leader, location
  against the day's volume-weighted average price, position within the session
  range, resting order-book balance, and traded liquidity, with every dimension
  mirrored for the side being sought. Only names that clear a quality bar become
  candidates. It enters with a resting limit order placed on the favorable side of
  the day's average price, waiting for a normal retracement instead of chasing.

  Exits are layered and risk-first. A protective stop sits beyond the level the
  market has recently defended, profit is taken in stages, a remaining portion is
  trailed so a strong move can keep working, and the stop is lifted toward
  breakeven once a trade moves enough in favor. A portfolio layer caps how many
  positions run at once, limits correlated exposure, expires stale resting orders,
  applies an intraday time-stop, and halts new entries when the day's running loss
  breaches a circuit breaker.

  Under the hood RUNECLAW is six cooperating engines, run once per cycle: a
  feature engine that pulls one 24h ticker snapshot per symbol; a regime engine
  that gates direction off the leader's daily change, VWAP side, and taker flow;
  a scoring engine that blends relative momentum, VWAP location, range position,
  order-book balance, and traded liquidity into a 0-100 directional score; a risk
  engine that solves position size backward from a fixed per-trade dollar loss and
  caps it by the margin budget; an execution engine that places the pullback limit
  and owns the live book (size-scoped ownership, stale-limit expiry, chase-cancel,
  intraday time-stop, and the daily circuit breaker); and an orchestrator that
  wires the cycle and emits one compact, readable diagnostic line summarizing what
  every engine did. The README documents each engine and its parameters in full.

  Subscribers can tune the universe, leverage, the margin budget that anchors
  sizing and the displayed return, the per-trade dollar risk cap, the number of
  names scanned per pass, the score required to act, whether shorting is enabled,
  and how many positions may run concurrently. Higher leverage or risk cap
  enlarges gains and drawdowns alike; widening the universe spreads attention but
  increases data load.

  The strategy underperforms when the leader chops without direction, when breadth
  is weak, or when fast moves slice through stops; by design it can sit idle for
  long stretches. Past performance is not a guarantee, and live trading pays fees
  and slippage that erode edge, so size every position to a drawdown you can
  tolerate.
market_type: contract
trading_symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "JTOUSDT", "BNBUSDT", "SUIUSDT", "FILUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "SKYAIUSDT", "BCHUSDT", "AVAXUSDT", "PENGUUSDT", "SIRENUSDT", "DOTUSDT", "ICPUSDT", "NEARUSDT", "LTCUSDT", "VIRTUALUSDT", "PUMPUSDT", "DYDXUSDT", "WLFIUSDT", "FARTCOINUSDT", "AAVEUSDT", "UNIUSDT", "OPUSDT", "ASTERUSDT", "DASHUSDT", "WLDUSDT", "WIFUSDT", "ORDIUSDT", "ARBUSDT", "TRXUSDT", "XPLUSDT", "RAVEUSDT", "XLMUSDT", "ETCUSDT", "TRUMPUSDT", "APTUSDT", "HBARUSDT", "1000BONKUSDT", "VVVUSDT", "BIOUSDT", "MUSDT", "CHIPUSDT", "PENDLEUSDT", "XMRUSDT", "ALGOUSDT", "CRVUSDT", "TIAUSDT", "RENDERUSDT", "INJUSDT", "JUPUSDT", "FETUSDT", "APEUSDT", "SEIUSDT", "ATOMUSDT", "LDOUSDT"]
