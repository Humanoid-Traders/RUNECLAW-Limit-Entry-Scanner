name: runeclaw-limit-scanner
display_name: "RUNECLAW Limit Entry Scanner"
version: "0.9.42"
description: "Live multi-asset perpetual-futures scanner across crypto, equities (RWA US stock perps), and commodities (precious metals) — each class gated by its own market-regime leader (BTC / Nasdaq-QQQ / gold) — placing pullback limit longs or shorts with portfolio-level risk controls"
long_description: |
  RUNECLAW is a two-sided, multi-asset scanner for USDT-margined perpetual
  futures that aims to trade with the prevailing regime rather than against it.
  It scans three asset classes in parallel — crypto, equities (RWA US stock
  perps), and commodities (precious metals) — each gated by its own
  market-regime leader: BTC for crypto, the Nasdaq proxy QQQ for equities, and
  gold for commodities.

  The thesis is that the cleanest intraday entries come from assets already
  moving in their leader's direction, positioned in the favorable part of their
  recent range, supported by real resting demand on the side it wants to trade.
  Before any candidate is considered, the strategy reads that class's regime;
  when the backdrop is weak or mixed it stands aside for that class and opens
  nothing, treating capital preservation as the first job. Each class's qualified
  candidates are merged into one pool, so a single cycle can short equities while
  it longs crypto — subject to portfolio concurrency and correlation caps.

  When a leader is constructive the scanner looks for longs; when it is clearly
  weak it looks for shorts. It ranks the universe with a blended score built from
  relative strength versus the leader, location against the day's VWAP, position
  within the session range, resting order-book balance, and traded liquidity —
  every dimension mirrored for the side being sought. Only names that clear a
  quality bar become candidates. It enters with a resting limit on the favorable
  side of VWAP, waiting for a normal retracement instead of chasing.

  Exits are layered and risk-first: a protective stop beyond the recently
  defended level, staged profit-taking, a trailed remainder so strong moves keep
  working, and a stop lifted toward breakeven once a trade moves enough in favor.
  A portfolio layer caps concurrent positions, limits correlated exposure,
  expires stale resting orders, applies an intraday time-stop, and halts new
  entries after a fresh losing streak (a stateless realized-loss breaker sourced
  from exchange fills, so it works without persisted state).

  Under the hood it is six cooperating engines run once per cycle — feature
  (one 24h ticker per symbol), regime (gates direction off the leader), scoring
  (the 0-100 directional blend), risk (size solved backward from a fixed
  per-trade dollar loss, capped by the margin budget), execution (places the
  pullback limit and owns the live book: size-scoped ownership, stale-limit
  expiry, chase-cancel, time-stop, circuit breaker), and an orchestrator that
  emits one compact diagnostic line per cycle. The README documents each in full.

  Subscribers can tune the universe, leverage, the margin budget that anchors
  sizing and the displayed return, the per-trade dollar risk cap, names scanned
  per pass, the score required to act, whether shorting is enabled, and how many
  positions run concurrently.

  The strategy underperforms when leaders chop without direction or fast moves
  slice through stops; by design it can sit idle for long stretches. Past
  performance is not a guarantee, and live trading pays fees and slippage that
  erode edge, so size every position to a drawdown you can tolerate.
market_type: contract
trading_symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "BNBUSDT", "SUIUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "BCHUSDT", "AVAXUSDT", "NEARUSDT", "AAVEUSDT", "WLDUSDT", "XPLUSDT", "XLMUSDT", "TRUMPUSDT", "MUSDT", "INJUSDT", "SEIUSDT", "PEPEUSDT", "SHIBUSDT"]
tags: ["scanner", "momentum", "vwap", "orderbook", "contract", "live", "runeclaw"]

schedule:
  cron: "*/15 * * * *"
  tz: "Asia/Shanghai"

decision_mode: deterministic
backtest_support: none
runtime_profile: deterministic
execution_mode: signal_only
follow_trade_supported: true

strategy_config:
  trading_symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "BNBUSDT", "SUIUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "BCHUSDT", "AVAXUSDT", "NEARUSDT", "AAVEUSDT", "WLDUSDT", "XPLUSDT", "XLMUSDT", "TRUMPUSDT", "MUSDT", "INJUSDT", "SEIUSDT", "PEPEUSDT", "SHIBUSDT"]
  leverage: 10
  margin_budget: "100"
  max_loss_usdt: "15"
  # v0.6.4 -- margin mode for new opens. "crossed" kept the proven open_* wrapper
  # path (the SDK wrappers cannot set margin_mode, so they always inherit
  # place_order's 'crossed' default -- which is why every prior position was
  # cross-margined despite older docs claiming isolated). "isolated" routes opens
  # through place_order(margin_mode='isolated'); fail-closed (a wrong hedge
  # mapping REJECTS rather than placing a wrong-direction trade). v0.9.29: flipped
  # to "isolated" at operator request (their rulebook mandates it; three flags in
  # one live day) -- per-trade loss is bounded by the exchange SL + max_loss
  # either way; isolated ADDITIONALLY caps a gap-through-stop to the position's
  # own margin instead of whole-account equity. Rollout: the key is card-tunable,
  # so the live trial ran via card override before this default was baked; if the
  # isolated open path ever rejects entries (its fail-closed mode), card-revert
  # to "crossed" restores the proven path instantly.
  margin_mode: "isolated"
  # v0.9.39 -- ops-safety layer (three mechanisms, zero signal changes):
  #   entries_paused    -- card-tunable safe mode: stop NEW entries while the
  #                        management engine (trail/steplock/scale-out/clocks/
  #                        breaker) keeps running. Ends the "disable the whole
  #                        playbook to be safe" dilemma, which abandoned open
  #                        positions to static exchange orders. Tail: no.paused.
  #   day guard         -- the STATELESS resurrection of the dead equity circuit
  #                        (circuit_pause_usdt 30 / circuit_stop_usdt 40 == the
  #                        operator's Rule 10 / Rule 13, dead since day one
  #                        because .state/ never persists -> the -cx token).
  #                        Realized fills since UTC midnight, UNSCOPED (account
  #                        frame -- manual fills count, matching the rulebook).
  #                        Soft = WARN ONLY (-dw in the cx slot, entries keep
  #                        flowing -- Rule 10 is a warning, not a halt); hard =
  #                        circuit tripped (tail cbtrip, entries halt, management
  #                        + exchange SL/TP untouched). Fail-open on unreadable
  #                        fills. The 24h rolling loss_breaker is UNCHANGED and
  #                        independent (different frame: rolling vs account-day).
  #   invariant_sentinel-- ("1") the engine audits itself each cycle and
  #                        confesses in the feed (cx slot -!clk/-!mgn/-!sl):
  #                        clk = per-mode clocks armed but mode recovery unknown
  #                        (the 2026-07-08 12h-clock incident class -- visible on
  #                        cycle one instead of forensic fills reconstruction);
  #                        mgn = live position crossed while manifest says
  #                        isolated; sl = protective stop implies risk >
  #                        max_loss x 1.3 (tolerance covers the benign ~2%
  #                        decision-vs-fill drift). Observation-only: it NEVER
  #                        changes behaviour, only reports.
  entries_paused: "0"
  invariant_sentinel: "1"
  # v0.9.40 -- decision transparency (both metrics-only, zero behaviour):
  #   paper-shadow -- when a GATE blocks entries (entries_paused / day halt /
  #     circuit), the would-be trade (symbol/side/entry/SL/TP/mode/notional) is
  #     logged to metrics.paper_trade, so every dark-by-choice period measures
  #     its own opportunity cost (participation gaps = the #1 P&L drag,
  #     reconciliation 2026-07-07).
  #   config_overrides -- keys whose EFFECTIVE (card-merged) value differs from
  #     the shipped default are logged each cycle (metrics.config_overrides);
  #     card tunes were previously invisible and had to be solved from token
  #     arithmetic (the live b4/b24 frac episode).
  max_scan_symbols: 28
  # v0.9.38 -- universe expansion, two mechanisms (measured 2026-07-08: 697
  # perps on the venue, only ~12 non-core crypto names above the core's own
  # $10M floor -- the 28 core IS the liquid crypto universe; what's missing is
  # the fresh-listing momentum class, LAB/XPL/TRUMP/M/EVAA, historically added
  # by hand weeks late):
  #   extra_symbols     -- card-tunable manual watchlist appended to the crypto
  #                        universe (trades normally; raise max_scan_symbols on
  #                        the card when the total passes 28 or the tail is
  #                        silently never scanned).
  #   universe_discovery-- SHADOW mode: one bulk ticker read ranks every
  #                        non-core USDT perp above discovery_min_volume_usdt,
  #                        scores the top discovery_max under the crypto regime,
  #                        and LOGS them (metrics.discovery). Nothing trades off
  #                        it -- a discovery rule cannot be honestly backtested
  #                        (today's list shows only survivors), so the engine
  #                        forward-tests it on itself; arming a trade path is a
  #                        separate future decision gated on that record.
  #   Fail-open everywhere: no bulk SDK surface / any error -> empty log.
  # v0.9.41 -- FORWARD TEST ARMED ("1", operator go 2026-07-08): shadow scan
  # is ON so the record accumulates. Still observation-only (never trades);
  # the top candidate surfaces on the SCAN line as `d:<SYM><score>`
  # (main_live._discovery_token, lowest budget priority). When the record
  # adjudicates, either arm a trade path or revert to "0" -- do NOT read the
  # armed default as a permanent baseline.
  # v0.9.42 -- MULTI-CLASS (operator "add all", 2026-07-08): discovery now
  # scans EVERY asset class Bitget lists, not just crypto. features.
  # classify_asset routes each candidate to its correct regime leader --
  # stocks/ETFs (SNDK/MU/SKHYNIX/SOXL/SPCX/... ~45 names) under the equities
  # (QQQ) leader, commodities (CL/XAUT/...) under metals (XAU), crypto under
  # BTC -- because scoring a stock under BTC is garbage (the v0.9.13 taker
  # bug). Per-class cap (discovery_max_per_class) so stocks never crowd out
  # crypto. STILL SHADOW: every class is scored + LOGGED (metrics.discovery
  # carries per-candidate class + leader), NONE trade. Arming any RWA class
  # to trade is a SEPARATE validated decision -- equities validation is thin,
  # metals is unvalidatable offline, and RWA gaps on earnings/macro. The old
  # RWA blocklist is retired: those names are now CLASSIFIED, not blocked.
  # discovery_classes restricts which classes scan ("crypto" = old behaviour).
  # No distinct pre-IPO perp class exists on the venue (SPCX = space, etf).
  extra_symbols: []
  universe_discovery: "1"
  discovery_max: 4
  discovery_max_per_class: 4
  discovery_classes: "crypto,equities,metals"
  discovery_min_volume_usdt: "30000000"
  discovery_blocklist: []
  # min_score DEFENDED both ways (2026-07-06 sweep, 35d live baseline): 65 loses
  # 11pt net (slot/correlation dynamics -- more qualifiers, fewer completed
  # trades) and 75 is catastrophic (PF 0.58; the 70-75 band holds the profitable
  # marginal trades). The v0.1.0 value is genuinely optimal.
  min_score: 70
  conditional_score: 50
  min_volume_usdt: "10000000"
  # atr_limit_mult DEFENDED both ways (2026-07-06 sweep, 35d): 0.2 and 0.5 both
  # fail to beat 0.3 on net+PF.
  # v0.9.43 -- operator's "stochastic OB/OS + KER trend + vol-regime band"
  # combo, adjudicated (frozen-tape A/B + bootstrap CI):
  #   stochastic OB/OS entry filter -- PROVEN HARM (rare CI-clear-of-zero kill):
  #     net +25.7/+56.7/+78.4 -> -5.8/-5.8/-10.5, PF 2.6 -> 0.24, 90% CIs
  #     [-64,-2]/[-101,-27]/[-138,-43], P(better)=0.04/0.002/0.001. It vetoes
  #     ~99% of qualified entries (1478/2186/2616 blocked); the 5-7 survivors
  #     are net losers. A mean-reversion veto (buy only deep-oversold) on a
  #     TREND-FOLLOWING engine keeps exactly the falling-knife trades and kills
  #     the pullback edge -- structure_trend_veto's lesson, extremal form.
  #   KER trend filter -- ALREADY KILLED: it is _efficiency_ratio, shipped as
  #     the er_floor chop gate (-49pt, see below/ledger).
  #   vol-regime band (0.20-0.85) -- ALREADY KILLED: the vol_ceiling gate halves
  #     net every window on the live 28-set (the high-vol alts are the winners).
  #   Net: all three components settled AGAINST. Do not re-litigate without
  #   beating these A/Bs.
  # v0.9.42 assumption probes (research-side, fresh same-fetch baselines):
  #   half-size regime path -- EMPTY, not killed: zero 1-vote candidates ever
  #     reached the qualified pool in any window (dead-zone era regimes are
  #     2-vote or neutral, effectively never 1-vote-with-a-qualifier). The
  #     half-size machinery stays as harmless fail-safe.
  #   loss_cooldown_hours=12 -- KILLED: -5.1/-5.1/-5.1pt, PF down every
  #     window. The "revenge trade" is actually the RE-LOAD and it pays: a
  #     symbol that just stopped us out is often at the extreme the strategy
  #     wants to fade again. Fourth confirmation: every filter on fills loses.
  #   feature_window_hours -- 24h DEFENDED: 48h loses catastrophically
  #     (win% -15pts, PF 3.31->1.78 at 35d); 12h untestable in the harness
  #     (recon warmup needs >=25 bars) AND unshippable live -- the window is
  #     the exchange 24h-ticker API's definition, not a config. The system's
  #     clock is both optimal and structurally fixed.
  # v0.9.41 resting-limit condition probes (research-side, 21/35/42d): can a
  # resting limit react to CHANGED conditions instead of only fill/chase/4h?
  # ALL THREE KILLED -- the exit trio is complete:
  #   limit_regime_cancel  -- cancel when the side opposes a flipped leader
  #     regime: -11/-17/-17pt, PF 2.55->1.63 at 21d. The dip that fills the
  #     limit and the regime vote flipping are often the SAME local extreme;
  #     cancelling there surrenders the reversion (structure_trend_veto's
  #     lesson from the order side).
  #   limit_requalify      -- re-score the symbol each cycle, cancel on floor
  #     fail/hard-skip: KILLED DECISIVELY (+6.5/PF 1.2 at 21d; 185-261
  #     cancels gut the fill pool). A second min_score raise in disguise --
  #     the marginal fill IS the profitable fill (triple-confirmed family).
  #   limit_reprice        -- follow the migrating VWAP anchor: INERT at the
  #     0.5-ATR design threshold (VWAP never drifts that far inside a 4h
  #     limit life -- zero events in any window); the one interpolation probe
  #     (0.2 ATR, 7-11 events) is marginally WORSE everywhere. The 4h expiry
  #     already IS the re-anchor: expire + fresh signal re-places at the new
  #     vwap +/- 0.3*ATR with zero added machinery.
  # v0.9.37 fill-rate audit + market-entry probe (research-side, 21/35/42d):
  # ~85% of posted pullback limits never fill and the misses lean 2:1 toward
  # missed winners (+0.6% avg 12h thesis-direction drift) -- yet taking the
  # SAME signals at MARKET instead (pullback_market_entry=1 in replay_mp) is
  # KILLED DECISIVELY: per-trade edge collapses +0.46% -> +0.08%, win% 62->47,
  # PF 2.55/3.44/2.90 -> 1.46/1.96/1.78, net down in every window. The
  # dip-to-fill requirement IS the edge filter (adverse-selection protection):
  # the ~15% of signals that fill are the ones where price actually mean-
  # reverted. The resting-limit patience is DEFENDED with numbers -- do not
  # re-litigate "misses trending moves that never pull back" without beating
  # this A/B.
  atr_limit_mult: "0.3"
  # v0.9.19 -- widened 4.0 -> 5.0 by the structural sweep (OOS-verified across 21/35/42d
  # breakout windows). The overextension cap doubles as the breakout-routing trigger:
  # at 4.0, names in the 4-5% extension band were routed to market breakout chases that
  # mostly bled; 5.0 prunes those marginal extended entries. Net +1.5 to +6pt with maxDD
  # flat-or-shallower and PF up in every window, stacks cleanly with breakout_trend_min
  # 0.7 (distinct mechanism). Equities keep their tighter 2.5 per-universe override.
  max_vwap_ext_pct: "5.0"
  # v0.9.20 vol-regime gate; DISABLED by default as of v0.9.21. Stand aside when the
  # chosen best's annualized realized vol (std of log returns over vol_lookback 1h
  # bars x sqrt(8760) x 100) is outside [vol_floor, vol_ceiling]. 0 = that side OFF.
  # WHY OFF: vol_ceiling 200 validated on the 14-symbol replay set (capped maxDD, net
  # up) but on the LIVE 28-symbol crypto universe it HALVES net in every window
  # (21/35/42d: +30.4/+69.2/+63.2% -> +17.9/+35.2/+35.0%) for only ~6pt of DD relief;
  # vol_ceiling 300 is barely better (net still down, DD relief ~1pt = noise). The
  # high-vol alts the gate refuses (PEPE/SHIB/LAB class) are the WINNERS on the live
  # set, not the drawdown drivers -- a cross-universe calibration trap. Mechanism is
  # retained and tested: set vol_ceiling>0 on the card to opt a universe back in.
  # FAIL-OPEN and cost-free when both are 0.
  vol_floor: "0"
  vol_ceiling: "0"
  vol_lookback: 30
  tp1_pct: "5.0"
  # v0.6.3 — trailing-stop exit (validated in research/replay_mp.py at 3-slot
  # concurrency). The manager ratchets the SL to price -/+ trail_atr_mult*ATR
  # (protective direction only, fail-safe no-op); tp2 is a WIDE backstop so the
  # trail isn't capped (a tight backstop erased the edge in validation). Longer
  # time_stop_hours gives the trail room. See docs/DESIGN_v0.6.3.md.
  # v0.9.15 — widened 15 -> 20 (strategy-sweep winner, re-reproduced serially here;
  # the harness is deterministic serially -- repeat runs are byte-identical). This
  # un-caps the WIDE backstop the trail is supposed to ride behind: at 15 a few
  # breakout runners were force-taken at +15% instead of trailed further. Controlled
  # A/B (only tp2 changed, full live stack) -- tp2=20 weakly DOMINATES tp2=15 in all
  # three windows, tail dead-flat everywhere, never worse on any metric:
  #   A 35d-breakout (primary): 73t +17.8% PF1.26 -> 74t +18.6% PF1.27  (+0.8pt net,
  #     +1 trade, +0.01 PF; maxDD -13.8% & worst-trade -6.2% UNCHANGED)
  #   B 21d-breakout:           42t +7.2% PF1.24  -> 42t +7.4% PF1.25   (+0.2pt, tail flat)
  #   C 35d-pullback:           30t +15.1% PF1.88 -> identical (fully inert)
  # Plateau step: tp2=10==15 and tp2=25==20 (the cap only binds between). NOTE the
  # real primary gain is ~+0.8pt (a handful of breakout-tail trades), NOT the +3.3pt
  # the sweep headline showed (its baseline wandered across concurrent runs). It is
  # deterministic and zero-downside, so it ships as a low-magnitude un-cap, not a
  # fitted optimum -- treat the net delta as directional.
  tp2_pct: "20.0"
  trail_atr_mult: "2.0"
  breakeven_pct: "2.0"
  # v0.9.6 -- breakeven floor UNDER the trail. The trail rides trail_atr_mult*ATR
  # behind the high-water mark, so a name that runs LESS than that width leaves the
  # stop below entry and gives back the whole move (the live 2026-07-02 MSTR case:
  # peaked +4.37% but the 2*ATR trail still sat below entry, so a would-be flat
  # stopped at -$3.75). Once breakeven is armed, the protective stop is floored at
  # breakeven_lock_pct the other side of entry (a small fee-clearing lock), applied
  # only when that price is already inside the market (never an above-market self-
  # trigger). Default 0 = OFF (pure trail, proven no-op -- same opt-in rollout as
  # loss_breaker_frac/event_blackout). Validated in research/replay_mp.py --ab-belock:
  # maxDD falls in EVERY window (35d breakout -29.4%->-16.4%), net preserved at
  # ~0.75*breakeven_pct; a tiny "flat" lock is the worst choice (banks nothing yet
  # chokes runners). Recommended when armed: 1.5 (must stay < breakeven_pct).
  # ARMED 2026-07-02: enabling at 1.5 after the live MSTR give-back (peaked +$26,
  # stopped -$3.75). Validated tail-cutting in every replay window and
  # net-preserving; 1.5 is 0.75*breakeven_pct so it clears fees and banks a real
  # win on a reversal without choking runners (a tiny flat lock was the worst).
  breakeven_lock_pct: "1.5"
  # v0.9.7 -- step-lock LADDER: generalizes the single lock above to rising
  # floors, "arm:lock,arm:lock" in % of entry. As a runner extends past each arm
  # level the protective floor climbs to that rung's lock, so a big move banks
  # progressively more on a reversal (the single lock only ever banked 1.5%).
  # Same contract: tighten-only, inside-market guard, stateless (the exchange SL
  # is the memory). Validated in replay --ab-exitpack: beat the single lock in
  # both breakout-ON windows (the live config; +14.7%->+21.2% net, PF 1.21->1.31
  # in the 35d window). ARMED at ship (it strictly extends the already-armed
  # v0.9.6 lock -- rung one IS the 2:1.5 lock). Empty string disables.
  steplock: "2:1.5,4:3,6:4.5"
  # v0.9.7 -- "Rule 9" scale-out: once a position moves scaleout_trigger_pct in
  # favour, close scaleout_frac of it at market; the remainder rides the trail +
  # ladder. The one STRICT win of the exit-pack A/B (net AND maxDD improved in
  # every window at frac 0.5). Ships OFF (0) despite validating because it is NEW
  # order surface (partial reduce via place_order trade_side=close, hedge-mode
  # fields) -- same trial gate as margin_mode v0.6.4: arm at small size first,
  # watch the scale_out/so diag, then trust. Fail-closed everywhere; an
  # exchange reject is surfaced, never retried blind. Recommended when trialed: 0.5.
  # ARMED 2026-07-02 (0.6.17): trial at the validated 0.5 -- bank half at +3.5%,
  # the remainder rides the trail + ladder. This is the trial itself: the first
  # live trim is the mapping proof (watch the scale_out action / so: diag; a
  # reject or a fail-closed no-op is surfaced, never retried blind). Positions
  # are already small ($60 margin/slot), which IS the small-size condition.
  # v0.9.24: 0.5 -> 0.35 (signal-audit sweep, 9/9 with the breaker recalibration
  # jointly: banking a third instead of half at tp1 leaves more runner on the
  # trail/ladder; +2.7..+4.2pt net on top of the breaker in every window, tail
  # unchanged). Validated as the COMBO -- do not retune one without the other.
  scaleout_frac: "0.35"
  scaleout_trigger_pct: "3.5"
  sl_min_btc_eth_pct: "1.5"
  sl_min_sol_bnb_pct: "1.2"
  sl_min_alt_pct: "2.5"
  bidask_full_ratio: "2.0"
  bidask_partial_ratio: "1.2"
  bidask_wall_ratio: "10.0"
  allow_short: true
  max_concurrent: 3
  max_correlated_alts: 2
  circuit_pause_usdt: "30"
  circuit_stop_usdt: "40"
  # v0.8.0 -- stateless realized-loss breaker (the working replacement for the
  # .state-backed equity circuit breaker above, which is dead in this runtime:
  # .state/ does not persist, so day_start_equity never round-trips). Pauses NEW
  # entries when trailing-window realized PnL (summed from exchange fills, no local
  # state) is at/below loss_breaker_frac * margin_budget * leverage. Validated in
  # research/replay_mp (DESIGN_v0.8.0): 0.08 over 24h was harmless in healthy
  # windows (never fired) and cut maxDD ~22% in weak ones. Default 0 = OFF (opt-in,
  # proven no-op); set frac to 0.08 to enable. Pause only -- never flattens.
  # ARMED 2026-07-01: the operator's first live drawdown session (2W/4L,
  # -$33.21, two correlated overnight crypto shorts both stopped) was the
  # exact pattern this breaker targets. Enabling now -- validated harmless in
  # healthy sessions, tail-cutting in weak ones.
  # v0.9.24 RECALIBRATION 0.08 -> 0.018: the signal-audit sweep validated the
  # harness's loss_pause=3 (stand aside after -3 return-units realized in 24 bars)
  # 9/9 -- net +7..+12pt AND maxDD -19.8 -> -15.4 AND PF up in EVERY window
  # (21/35/42d, live 28-symbol set), win% up on FEWER trades: it cuts the losing
  # CLUSTERS (the live July-5 MSTR->ETH-short back-to-back stop pattern). Unit
  # mapping: 1 ret-unit ~= notional/100 ~= $6 at the $600 full-size slot -> -3
  # ret-units ~= -$18 realized -> frac = 18 / (margin 100 x lev 10) = 0.018. The
  # mapping is approximate (scale-out trims and 0.5-size regimes vary notional per
  # ret-unit) but the direction is unambiguous: the old 0.08 (-$80) threshold was
  # ~4.4x looser than the validated stand-down point and essentially never fired.
  # Feed note: the -b<headroom> token's arithmetic shrinks accordingly (~18 max).
  loss_breaker_frac: "0.018"
  loss_breaker_window_hours: "24"
  # v0.9.1 -- Phase-4 live trade journal. Each cycle, emit recent closed-trade
  # realized records (from exchange fills -- the same read the loss breaker uses, so
  # no extra cost when the breaker is on) into the DBG metrics, so live results can
  # be reconciled against the backtest (the missing live-vs-backtest feedback loop).
  # Read-only, fail-open. Realized PnL only -- live MAE/MFE needs an intra-trade
  # high-water track the stateless runtime can't keep. Default on; set false to skip.
  journal_enabled: "true"
  journal_window_hours: "24"
  # v0.9.5 -- macro event blackout (audit: "no news/event filter on RWA equity
  # perps"). Universes with `event_blackout: true` suppress NEW entries within
  # +/- event_blackout_hours of a high-importance US calendar event (FOMC, CPI,
  # NFP -- data.economy.calendar). Opt-in: 0 = OFF (proven no-op default, same
  # rollout pattern as margin_mode/loss_breaker). Recommended: 2. FAIL-OPEN --
  # an unreadable calendar never blocks trading; existing positions/limits are
  # never touched (this gates opens only).
  # ARMED 2026-07-02 (0.6.15): set to 2 now that the equity legs (TSLA/NVDA/MSTR)
  # are fully effective in 0.6.14. Stock perps gap on high-importance US prints
  # (FOMC/CPI/NFP) and the SL/trail are tuned on crypto's continuous tape, so
  # opted-in universes stand aside +/-2h around those events. Crypto/metals do
  # not opt in, so their entries are unaffected.
  event_blackout_hours: "2"
  event_blackout_importance: "high"
  event_blackout_country: "US"
  # v0.9.30 -- per-symbol EARNINGS blackout (equity.calendar.earnings). The macro
  # calendar above does not know MSTR reports tonight; a perp entered into a
  # report is binary-event roulette the SL cannot price. Day-granular window
  # (the calendar carries a date, not a timestamp): the report's UTC day padded
  # by this many hours on both sides. Entries only; scores stay visible;
  # FAIL-OPEN (unreadable calendar = no blackout). Armed at 4h because the cost
  # bound is structurally tiny (~1 day/quarter/symbol, ~1% of days -- unlike the
  # session gate's 70%, which failed data validation). Opted in per-universe
  # (equities); 0 = off.
  earnings_blackout_hours: "4"
  # v0.9.31 -- regime vote dead-zones (signal-audit finding #2: all three regime
  # votes were razor-edged, so a leader hovering at +0.05% or brushing VWAP
  # flipped the whole universe long<->short between cycles -- the live L<->s
  # whipsaw churning limit placements). A dead-zone withdraws a vote inside its
  # noise band -> weak tape yields reduced-size/none regimes instead of
  # full-size flips. Stateless; 0 = bit-exact legacy edges.
  # SWEEP VERDICTS (21/35/42d, live 28-symbol baseline):
  #   chg 0.3  -- ARMED: wins 9/9 cells solo (net +7.7/+5.0/+4.8pt, PF 1.58->2.00
  #               / 2.78->2.92 / 2.39->2.49, maxDD IDENTICAL -19.8 everywhere).
  #               A +/-0.3% day-change genuinely carries no direction.
  #               INTERACTION NOTE (jointly with the live loss-pause modelled as
  #               loss_pause_pct=3): the edge SHRINKS to +7.7/+2.1/-1.2pt --
  #               both mechanisms cut chop losses, so they partially overlap.
  #               Tail never worse, PF up-or-equal in every window; kept armed
  #               with the shrinkage on record.
  #   vwap 0.1 -- KILLED: net -6..-14pt AND maxDD -19.8 -> -22.5 in EVERY
  #               window. The VWAP razor edge is load-bearing (it is the
  #               system's entry anchor) -- do not soften it. Keep 0.
  #   both     -- inherits the vwap poison; killed with it.
  # v0.9.35 anchored-VWAP probe (research-side vwap_anchor knob, replay_mp
  # _recon; never shipped to src). Re-anchoring the VWAP itself, 21/35/42d
  # vs rolling baseline +25.9/+84.7/+83.2, PF 2.55/3.36/2.85, DD -15.4:
  #   swing-anchored -- KILLED CATASTROPHICALLY: +6.0/+47.5/+40.8, PF down to
  #               1.13/1.61/1.47, maxDD -25.7/-25.7/-26.1. A pivot-anchored
  #               VWAP whipsaws the anchor every confirmation and poisons all
  #               four consumers at once.
  #   day (UTC)  -- KILLED on the all-windows net rule (-1.5/-9.8/-0.7pt, PF
  #               down in all three) BUT documented as the system's best
  #               DEFENSIVE profile yet: maxDD -15.4 -> -7.9/-7.9/-9.1 (nearly
  #               halved) because the day anchor hugs price, doubling pullback
  #               fills at half the per-trade edge. If live risk appetite ever
  #               drops, vwap_anchor=day in replay is the first thing to
  #               re-examine -- NOT armed.
  # Verdict: the rolling 24h VWAP is defended a second time (dead-zone sweep
  # killed softening it; this killed re-anchoring it). It stays the anchor.
  # v0.9.37 score-weighted sizing probe (score_size_floor=0.7 in replay_mp;
  # floor at score 70 -> full size at 90): KILLED -- net -4.3/-18.5/-21.5pt
  # across 21/35/42d for ~4pt of DD relief. THIRD independent confirmation
  # that score is a THRESHOLD, not a magnitude: the 70-75 floor-grazers carry
  # a disproportionate share of the net (same fact behind the min_score-75
  # catastrophe and the flat weight ablations). Do not size by score.
  # v0.9.37 per-universe OOS validation (21/35/42d, own leaders):
  #   equities (QQQ-led, breakout-only, ext 2.5) DEFENDED: +13.6/+21.5/+30.9,
  #     PF 2.08/2.20/2.73, maxDD never past -4.6 -- earns its slot cleanly.
  #   metals (XAU-led, XAG) NO EVIDENCE EITHER WAY: zero entries in 42d of
  #     replay because the harness's degraded order-book fallback caps XAG at
  #     ~68 (live prints 72q with a real book). Metals is UNVALIDATABLE
  #     offline -- it rides on live results only; revisit if live XAG trades
  #     accumulate a losing record.
  # v0.9.37 funding-as-signal: adjudicated WITHOUT a build -- research/funding.py
  # history shows funding on this universe sits far from the 30bps gate at all
  # times (the gate has never fired live). A signal with no dynamic range has
  # nothing to trade on; not built, not worth the code.
  # (Equities min_score 80/85 swept in the same run: KILLED -- net collapses
  #  22.5->8.8 / 31.9->8.8; the small-universe score inflation is real but
  #  harmless, the 70-floor trades are profitable. Stays 70.)
  # regime_taker_vote gates the third vote entirely: the replay harness has
  # never simulated taker (every validation is of the 2-vote gate), so "0" =
  # exact live/replay parity; "1" (default) = current live behaviour --
  # unswept either way (no historical taker data), so the default stays put.
  regime_chg_deadzone_pct: "0.3"
  regime_vwap_deadzone_pct: "0"
  regime_taker_deadzone: "0"
  regime_taker_vote: "1"
  # v0.9.33 -- pass-1 score dimension weights (signal-audit finding #5). Values
  # = the v0.1.0 legacy split, bit-exact; each rescales its dim's CONTRIBUTION
  # only. Built for ABLATION ("does this signal earn its weight?" -- set one to
  # 0), not for grid-tuning, which is an overfit machine. Hard disqualifiers
  # (walls, thin volume, no VWAP) are not weights and hold at any setting.
  # ABLATION VERDICTS (2026-07-06, 21/35/42d joint-live baseline):
  #   volume 15 -- DEFENDED DECISIVELY. Zeroing it TRIPLES trades (67->101 at
  #     42d: the small caps it suppresses flood in), win% -10pts, net -3..-18pt,
  #     PF HALVES in every window. The "majors bias" is a quality filter.
  #   orderbook 20 -- DEFENDED ON NET, mechanism understood. Zeroed at the
  #     fixed 70-floor it collapses the system (max score 80 -> nothing
  #     qualifies; PF 0.35-0.76) -- a THRESHOLD artifact. De-confounded with a
  #     proportional floor (56): recovers to +76.3/PF 3.76/DD -10.6 vs baseline
  #     +86.8/3.47/-15.4 -- identical per-trade avg (+1.44 vs +1.42). So the
  #     dim's +10.5pt of net comes from PARTICIPATION scale, not per-trade
  #     prediction; a defensive lower-net/better-tail profile exists at
  #     (book=0, floor 56) but net rules -> keep legacy.
  # With these two defended, EVERY pass-1 input has now been questioned once.
  score_w_momentum: "25"
  score_w_vwap: "20"
  score_w_range: "20"
  score_w_orderbook: "20"
  score_w_volume: "15"
  # v0.9.34 -- swing-structure + candle engine (features.swing_points /
  # structure_read / candle_veto, computed from the closed entry-TF bars already
  # fetched -- zero extra calls; harness populates identically for parity). The
  # system's only prior "structure" was the ROLLING 24h high/low. Four opt-in
  # consumers -- SWEPT solo on the joint live baseline (loss_pause 3 + chg dz
  # 0.3), 21/35/42d OOS, baseline +25.9/PF2.55, +84.7/3.36, +83.2/2.85.
  # ALL FOUR KILLED (net loser in every window; keys stay as ablation hooks):
  #   pullback_structure_stop   -- stop beyond the last CONFIRMED pivot instead
  #                                of the rolling 24h extreme (sl_min still floors).
  #                                KILLED: -2.7/-2.7/-2.5pt, PF down in all 3.
  #                                Tighter pivot stops tag out pullbacks the 24h
  #                                anchor survives (same lesson as the buffer,
  #                                opposite direction: the 24h extreme is FINE).
  #   breakout_structure_confirm-- breakout must also BREAK the last pivot, not
  #                                just sit near a rolling extreme. KILLED: 21d
  #                                inert, -11.8/-11.7pt at 35/42d -- the 8 extra
  #                                trades it filters were NET WINNERS (a rolling-
  #                                extreme break that hasn't broken the last pivot
  #                                yet is early, and early is where the money is).
  #   structure_trend_veto      -- skip candidates whose HH/HL-vs-LH/LL structure
  #                                opposes their side. KILLED DECISIVELY:
  #                                -11.6/-16.0/-17.9pt, PF 2.55->1.61 at 21d, DD
  #                                worse. Counter-structure entries are the
  #                                strategy (pullback = buying vs falling 1h
  #                                structure by construction).
  #   candle_veto               -- skip on a counter-candle last closed bar
  #                                (doji / engulfing-against-side). KILLED on the
  #                                all-windows rule: -7.4/-2.6/-7.3pt net. NOTED,
  #                                not armed: the breakout SIDE improves in every
  #                                window (win% 70/76/75 -> 78/83/80, 35d PF 3.81)
  #                                -- a counter-candle is bad for continuation but
  #                                is exactly the bar a pullback limit WANTS; a
  #                                breakout-scoped variant projects flat at 21d
  #                                (+25.7 vs +25.9), so it doesn't clear the bar.
  swing_k: 3
  pullback_structure_stop: "0"
  breakout_structure_confirm: "0"
  structure_trend_veto: "0"
  candle_veto: "0"
  time_stop_hours: "12"
  # v0.9.22 -- trade-type exit packs (per-mode keys; 0 = inherit the global rule,
  # the exact pre-v0.9.22 behaviour). Phase-1/2 replay on the LIVE 28-symbol set:
  # the two entry modes want OPPOSITE leashes. Pullbacks decay when held (win%
  # 62->38 as the cap grows -- they bounce fast or they're dead; the July-5 MSTR
  # 8h red grind was this class), so they get a 4h cap (net +3.0/+7.7pt at
  # 35/42d, -1.1pt noise at 21d, tail equal). Breakouts are the runners (win%
  # RISES 70->80 with hold) -- they keep the global 12h. Both caps remain
  # UNCONDITIONAL on P&L. Mode is recovered at manage time from the attached TP
  # backstop width (execution._position_entry_mode; exchange-is-the-memory):
  # pullback_tp2_pct 22 vs the breakout-inherited tp2_pct 20 is the marker --
  # PROVEN bit-for-bit inert in replay (a 4h-capped pullback never reaches a
  # 20-22% backstop) where marking the BREAKOUT side at 25 cost 5-7pt net in
  # every window (that backstop genuinely governs; do NOT arm breakout_tp2_pct).
  # Unrecoverable mode (legacy position, unreadable plan) -> global 12h cap.
  # CAVEAT: metals had ZERO replayable pullback trades in 42d (class ~absent
  # there), so the 4h cap is unvalidated-but-low-stakes on that universe.
  pullback_time_stop_hours: "4"
  pullback_tp2_pct: "22"
  # v0.9.28 -- SWEPT AND KILLED; keep 0. Pads the pullback structural stop beyond
  # the 24h extreme (motivated by the live 2026-07-06 ETH short: SL $1804.00
  # tagged by the $1804.37 swing top, then a $17 favourable reversal). The
  # 21/35/42d x {0.2,0.4,0.6} sweep on the live 28-symbol baseline: IDENTICAL
  # pullback trade counts and win rates at every level (the buffer rescued ZERO
  # stops in 67 in-sample pullbacks -- the near-tag class had zero measured
  # frequency at 1h resolution) while the size cost bled net 0.2-0.4pt/step and
  # nudged maxDD worse in every window. All cost, no rescue -> unarmed. The knob
  # stays (0 = bit-exact legacy) for revisit ONLY if live shows RECURRING
  # near-tag stop-outs; one vivid anecdote lost to 67 measured trades.
  pullback_stop_buffer_pct: "0"
  breakout_time_stop_hours: "0"
  breakout_tp2_pct: "0"
  # limit_expiry_hours DEFENDED (2026-07-06, 35d): 6h loses 15pt net -- stale
  # limits that fill late fill badly. limit_chase_pct DEFENDED (21/35/42d): 4.0
  # screened +8.9pt at 35/42d but REGRESSED -4.5pt/PF-down at 21d; the 3.5
  # interpolation was mixed the same way (21d -7.3). The recent window
  # consistently punishes wider chasing -> keep 3.0; the live no.far blocks are
  # the filter working, not a defect.
  limit_expiry_hours: "4"
  limit_chase_pct: "3.0"
  size_scope_mult: "1.5"
  breakeven_trigger_usdt: "20"
  # v0.2.0 — kline engine (multi-timeframe ATR + higher-TF trend)
  kline_interval: "1h"
  atr_period: 14
  trend_interval: "4h"
  trend_lookback: 12
  trend_norm: "0.05"
  trend_weight: "15.0"
  enrich_top_n: 8
  # v0.2.0 — funding engine (crowding skip + soft penalty)
  funding_interval: "1h"
  funding_window: 8
  funding_skip_bps: "30"
  funding_penalty_weight: "8.0"
  # v0.9.12 -- universes the funding skip/penalty applies to. Funding is sourced
  # from data.crypto.futures.funding_rate, a CRYPTO endpoint with no RWA-equity or
  # metals coverage, so on those perps it returns a mis-resolved/foreign value that
  # spuriously trips the 30bps skip (the live MSTR funding_cr flicker). Restricting
  # the funding logic to crypto -- where the reading is native -- removes the whole
  # spurious-skip class while keeping full crowding protection on crypto. Fail-open
  # on an unknown/empty universe (an unlabeled crypto candidate keeps protection).
  funding_universes: ["crypto"]
  # v0.9.13 -- universes the taker-flow regime gate applies to. taker_buy_ratio
  # sources data.crypto.futures.taker_volume, a CRYPTO endpoint (same class as
  # funding); on equity/metals leaders (QQQ/XAU) it returns a mis-resolved value
  # that can flip the universe's regime side AND size. Restrict it to crypto, where
  # the reading is native; non-crypto leaders pass taker=None and the gate degrades
  # to the up/vwap 2-signal form. Fail-open on an unknown/empty universe.
  taker_universes: ["crypto"]
  # v0.5.0 — momentum/breakout entry path (OFF by default; flip per instance).
  # When on, a crypto name extended past max_vwap_ext_pct that is riding a strong
  # aligned higher-TF trend at the session extreme is entered at MARKET (not a
  # pullback limit it could never fill), with a tight structure stop. See
  # docs/DESIGN_v0.5.0.md. v0.5.1: enabled by default + exposed as a subscriber
  # toggle so the crypto breakout path runs live (was off-by-default in v0.5.0).
  breakout_enabled: true
  # v0.9.19 -- raised 0.6 -> 0.7 (structural sweep, OOS-verified). This is the higher-TF
  # trend-strength floor a breakout must clear or it is demoted to breakout_unconfirmed.
  # 0.7 removes the [0.6,0.7) weak-trend / false-breakout class (the -59%-then-recover
  # whipsaws): net +4.9pt in EVERY window (21/35/42d) with maxDD and worst-trade UNCHANGED
  # -- pure removal of weak-breakout bleed, no tail cost. 0.8 adds nothing beyond 0.7.
  breakout_trend_min: "0.7"        # min kline trend_strength [0,1] to confirm
  breakout_extreme_band: "0.015"   # must be within 1.5% of the 24h extreme
  breakout_stop_atr_mult: "1.0"    # structure-stop volatility floor in ATRs
  breakout_level_buffer_pct: "0.2" # stop sits this % beyond the broken level
  breakout_tp1_pct: "4.0"          # breakout first target (independent of pullback tp1)
  # v0.3.0 — multi-universe scanning; each universe gates on its own leader.
  # A universe with no 'symbols' inherits the trading_symbols list above.
  # v0.6.0 — breakout is now per-universe (was hard-wired to crypto). A universe
  # opts in with breakout: true; `overrides` tunes pass-1 keys for that class.
  universes:
    - name: "crypto"
      leader: "BTCUSDT"
      breakout: true
    # v0.3.1: pruned to silver-only. Gold leads/gates; Pt/Pd/Cu were always
    # below min_volume_usdt ($10M) on Bitget -> permanently thin-skipped, so they
    # were dead weight (wasted scan calls). Silver (~$257M/24h) is the one liquid
    # metal candidate. Effective metals leg = "trade silver, gated by gold."
    - name: "metals"
      leader: "XAUUSDT"
      symbols: ["XAGUSDT"]
    # v0.4.0: equities (RWA US stock perps), gated by the Nasdaq proxy QQQ.
    # Only liquid names kept (>= min_volume_usdt $10M): QQQ leads/gates; TSLA,
    # NVDA, MSTR are candidates. SPX/AAPL/MSFT/AMZN/GOOGL/META/COIN were below
    # the volume floor -> excluded. NOTE: stock perps track underlying equities
    # that gap on session boundaries; off-hours liquidity is thinner than crypto.
    # v0.6.0: equities opt into breakout. They trend (MSTR chase-cancelled twice
    # into a clean down-move the pullback-short could not catch) but move less than
    # crypto, so the breakout routing trigger is lowered to 2.5% extension (vs the
    # crypto 4%) via a per-universe override. Market-entry slippage on these thinner
    # books is watched; set breakout: false here to revert if it is bad.
    # v0.9.5: equities opt into the macro event blackout (see
    # event_blackout_hours below) -- stock perps gap on high-importance US
    # prints and the SL/trail are tuned on crypto's continuous tape.
    # NOTE (v0.9.5 bug fix): per-universe flags (breakout / overrides /
    # event_blackout) were silently DROPPED by _universes() since v0.6.0 --
    # equities actually ran pullback-only at the global 4% ext cap the whole
    # time. The passthrough is fixed; these flags are now effective.
    - name: "equities"
      leader: "QQQUSDT"
      symbols: ["TSLAUSDT", "NVDAUSDT", "MSTRUSDT"]
      breakout: true
      # v0.9.22: equities trade BREAKOUTS ONLY. Phase-1/2 replay (21/35/42d,
      # QQQ-led): equity pullback entries are net-NEGATIVE at EVERY hold cap
      # (win 29-37%, n>=31/window; the July-5 weekend MSTR grind was one) while
      # equity breakouts pay (+12/+27/+33% net, win 65-73%). Dropping the class
      # roughly DOUBLES PF (1.3 -> 1.9-3.0) and halves maxDD (-11 -> -4.6).
      # A session-hours gate (session_hours_utc, main_live._session_open) was
      # also built and tested: it HURTS on top of pullback-off (off-session
      # equity breakouts are profitable; -12pt net at 42d) -- leave it unarmed.
      pullback: false
      event_blackout: true
      earnings_blackout: true   # v0.9.30: stand down a symbol around ITS report
      overrides:
        max_vwap_ext_pct: "2.5"

user_config_schema:
  trading_symbols:
    type: array
    item_type: string
    default: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "BNBUSDT", "SUIUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "BCHUSDT", "AVAXUSDT", "NEARUSDT", "AAVEUSDT", "WLDUSDT", "XPLUSDT", "XLMUSDT", "TRUMPUSDT", "MUSDT", "INJUSDT", "SEIUSDT", "PEPEUSDT", "SHIBUSDT"]
    options: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LABUSDT", "ZECUSDT", "XRPUSDT", "DOGEUSDT", "TAOUSDT", "HYPEUSDT", "BNBUSDT", "SUIUSDT", "ADAUSDT", "LINKUSDT", "ENAUSDT", "ONDOUSDT", "BCHUSDT", "AVAXUSDT", "NEARUSDT", "AAVEUSDT", "WLDUSDT", "XPLUSDT", "XLMUSDT", "TRUMPUSDT", "MUSDT", "INJUSDT", "SEIUSDT", "PEPEUSDT", "SHIBUSDT"]
    min_items: 1
    max_items: 28
    label: "Scan universe (USDT perpetuals; first constructive name is the regime gate)"
  leverage:
    type: integer
    default: 10
    min: 1
    max: 25
    aliases:
      10x: 10
      20x: 20
    label: "Leverage"
  margin_budget:
    type: string
    default: "100"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Margin budget USDT (sizing + return %% denominator)"
  max_loss_usdt:
    type: string
    default: "15"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Max loss per trade USDT (drives position size from the stop)"
  max_scan_symbols:
    type: integer
    # v0.9.4 (audit M-3): default was 66 with max 28 -- the default violated its
    # own bound. Align with strategy_config.max_scan_symbols (28).
    default: 28
    min: 5
    max: 28
    label: "Symbols scanned per pass"
  min_score:
    type: integer
    default: 70
    min: 1
    max: 100
    label: "Minimum score to place a long or short"
  allow_short:
    type: boolean
    default: true
    label: "Enable short-side setups"
  max_concurrent:
    type: integer
    default: 3
    min: 1
    max: 10
    label: "Max concurrent open positions"
  atr_limit_mult:
    type: number
    default: 0.3
    min: 0.1
    max: 1.5
    label: "Limit-entry depth (x ATR from VWAP; lower fills sooner)"
  max_vwap_ext_pct:
    type: string
    default: "5.0"     # v0.9.19: kept in sync with strategy_config (see the runtime value above)
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Max distance from VWAP to enter (%; beyond this a strong-trend crypto name is a breakout, not a pullback)"
  vol_ceiling:
    type: string
    default: "0"       # v0.9.21: synced with strategy_config; gate OFF (halves net on the live 28-symbol set)
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Volatility ceiling (annualized realized vol %; stand aside on chaos-vol names above this; 0 = off)"
  breakout_enabled:
    type: boolean
    default: true
    label: "Breakout entries (crypto): market-enter strong trends extended past the VWAP cap, with a tight structure stop"
  margin_mode:
    type: string
    default: "isolated"
    pattern: "^(crossed|isolated)$"
    label: "Margin mode for new opens (isolated = v0.9.29 default, caps gap-risk to the position's margin; crossed = the pre-v0.9.29 proven path, instant revert)"
  loss_breaker_frac:
    type: number
    default: 0.018
    min: 0
    max: 0.5
    label: "Realized-loss breaker: pause new entries after trailing-window realized loss reaches this x one slot's notional (0 = off; 0.018 = v0.9.24 validated default ~= -3 return-units/24h)"
  loss_breaker_window_hours:
    type: number
    default: 24
    min: 1
    max: 168
    label: "Realized-loss breaker lookback window (hours)"
  journal_enabled:
    type: boolean
    default: true
    label: "Live trade journal: emit closed-trade realized records each cycle for live-vs-backtest reconciliation (read-only)"
  journal_window_hours:
    type: number
    default: 24
    min: 1
    max: 168
    label: "Live journal lookback window (hours)"
  event_blackout_hours:
    type: number
    default: 2
    min: 0
    max: 24
    label: "Macro event blackout: suppress NEW entries in opted-in universes within this many hours of a high-importance US calendar event (0 = off; 2 recommended for RWA equities)"
  breakeven_lock_pct:
    type: number
    default: 1.5
    min: 0
    max: 5
    label: "Breakeven floor under the trail: once a trade is in profit, lock the stop this %% the other side of entry so a runner that reverses can't give back the whole move (0 = off; 1.5 recommended when armed, must stay below breakeven_pct; see DESIGN v0.9.6)"
  steplock:
    type: string
    default: "2:1.5,4:3,6:4.5"
    pattern: "^([0-9]+(\\.[0-9]+)?:[0-9]+(\\.[0-9]+)?)(,[0-9]+(\\.[0-9]+)?:[0-9]+(\\.[0-9]+)?)*$|^$"
    label: "Step-lock ladder 'arm:lock,arm:lock' in %% of entry -- the protective floor climbs to the highest armed rung as the move extends (empty = off; '2:1.5,4:3,6:4.5' validated)"
